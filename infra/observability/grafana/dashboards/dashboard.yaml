# =============================================================================
# Grafana Dashboard Provisioning — Enterprise AI Control Plane
# =============================================================================

apiVersion: 1

providers:
  - name: "Default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards

# =============================================================================
# Alembic Configuration — Control Plane Database Migrations
# =============================================================================
# Usage:
#   alembic upgrade head     — apply all pending migrations
#   alembic downgrade -1     — rollback last migration
#   alembic revision --autogenerate -m "description"  — create new migration
# =============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path setup — the app directory is added automatically via env.py
prepend_sys_path = . app

# Timezone handling when writing migration time
# timezone = UTC

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
